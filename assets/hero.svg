  <text x="766" y="346" fill="white" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="700">Desktop App Profiles</text>
  <text x="766" y="375" fill="#98A9C8" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">Cloned Codex.app bundles with separate Electron userData and patched multi-instance behavior.</text>

  <rect x="940" y="412" width="146" height="86" rx="20" fill="#102038" stroke="#2A436B"/>
  <text x="1013" y="448" fill="white" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="700" text-anchor="middle">Codex.app</text>
  <text x="1013" y="474" fill="#9CB0D0" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" text-anchor="middle">Upstream app</text>

  <path d="M1013 510V546" stroke="#55739E" stroke-width="4" stroke-linecap="round"/>
  <path d="M1013 546L903 578" stroke="#55739E" stroke-width="4" stroke-linecap="round"/>
  <path d="M1013 546L1123 578" stroke="#55739E" stroke-width="4" stroke-linecap="round"/>

  <rect x="780" y="580" width="240" height="104" rx="22" fill="#12233B" stroke="#29517F"/>
  <rect x="798" y="598" width="40" height="40" rx="12" fill="url(#accentBlue)"/>
  <text x="818" y="624" fill="white" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" text-anchor="middle">W</text>
  <text x="858" y="617" fill="white" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22">Codex Work.app</text>
  <text x="858" y="644" fill="#A7B8D5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">~/Library/Application Support/Codex-Work</text>

  <rect x="1008" y="580" width="240" height="104" rx="22" fill="#26142A" stroke="#7A2E5D"/>
  <rect x="1026" y="598" width="40" height="40" rx="12" fill="url(#accentPink)"/>
  <text x="1046" y="624" fill="white" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" text-anchor="middle">P</text>
  <text x="1086" y="617" fill="white" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22">Codex Personal.app</text>
  <text x="1086" y="644" fill="#DAB5CA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">~/Library/Application Support/Codex-Personal</text>

  <rect x="92" y="724" width="1216" height="54" rx="20" fill="#0A1322" stroke="#22314D"/>
  <text x="700" y="757" fill="#D6E0F2" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" text-anchor="middle">One machine. Multiple Codex profiles. CLI and desktop kept apart on purpose.</text>
</svg>
